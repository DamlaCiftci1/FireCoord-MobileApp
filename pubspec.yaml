name: firecoord_mobile
description: FireCoord - Yangın Koordinasyon ve Takip Sistemi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  firebase_messaging: ^15.1.3

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  # State Management
  provider: ^6.1.2

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/FC_ICON.png"
  min_sdk_android: 21



flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/




